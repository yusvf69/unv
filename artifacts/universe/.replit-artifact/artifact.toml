kind = "web"
previewPath = "/"
title = "UniVerse"
version = "1.0.0"
id = "artifacts/universe"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23974

[services.development]
run = "pnpm --filter @workspace/universe run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/universe", "run", "build" ]
publicDir = "artifacts/universe/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23974"
BASE_PATH = "/"
